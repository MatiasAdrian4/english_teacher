line-length = 88
target-version = "py310"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (handled by formatter)
    "B008", # Depends() in argument defaults is the intended FastAPI pattern
]

[lint.per-file-ignores]
"__init__.py" = ["F401"] # unused imports in __init__ files are fine

[format]
quote-style = "double"
indent-style = "space"
